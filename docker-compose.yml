services:
  nextjs:
    build: .
    container_name: fadiljaya-nextjs
    restart: unless-stopped
    ports:
      - "5000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - fadiljaya-net

  migrate:
    build:
      context: .
      target: migrate
    container_name: fadiljaya-migrate
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - fadiljaya-net
    profiles:
      - tools

  freeradius:
    build:
      context: ./freeradius
      dockerfile: Dockerfile
    container_name: fadiljaya-radius
    restart: unless-stopped
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    environment:
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      RADIUS_SECRET: ${RADIUS_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - fadiljaya-net

  mysql:
    image: mysql:8
    container_name: fadiljaya-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: fadiljaya_net
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - fadiljaya-net

  nginx:
    image: nginx:alpine
    container_name: fadiljaya-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro          # Let's Encrypt certificates (host)
      - /var/www/certbot:/var/www/certbot:ro           # Certbot webroot for renewals
    depends_on:
      - nextjs
    networks:
      - fadiljaya-net

networks:
  fadiljaya-net:
    driver: bridge

volumes:
  mysql_data:
