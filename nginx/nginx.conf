events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile           on;
    keepalive_timeout  65;
    server_tokens      off;  # hide nginx version

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 5;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # ── SSL session cache (shared across workers) ──────────────────────────────
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── SSL protocols & ciphers ────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # ── Upstream ───────────────────────────────────────────────────────────────
    upstream nextjs {
        server nextjs:3000;
    }

    # ── HTTP → HTTPS redirect for all vhosts ──────────────────────────────────
    server {
        listen      80;
        server_name netadmin.fadiljaya.com wifi.fadiljaya.com wifiapi.fadiljaya.com;

        # Certbot webroot renewal — must be served over HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Panel Admin — netadmin.fadiljaya.com ───────────────────────────────────
    server {
        listen      443 ssl;
        http2       on;
        server_name netadmin.fadiljaya.com;

        ssl_certificate     /etc/letsencrypt/live/netadmin.fadiljaya.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/netadmin.fadiljaya.com/privkey.pem;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options            SAMEORIGIN                                    always;
        add_header X-Content-Type-Options     nosniff                                       always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;

        location / {
            proxy_pass         http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
        }
    }

    # ── Portal User — wifi.fadiljaya.com ──────────────────────────────────────
    server {
        listen      443 ssl;
        http2       on;
        server_name wifi.fadiljaya.com;

        ssl_certificate     /etc/letsencrypt/live/wifi.fadiljaya.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/wifi.fadiljaya.com/privkey.pem;

        # Security headers (no HSTS preload here — portal is accessed from unknown devices)
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Content-Type-Options    nosniff            always;

        location / {
            proxy_pass         http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ── API Internal — wifiapi.fadiljaya.com ──────────────────────────────────
    # Hanya MikroTik dan jaringan internal yang boleh akses.
    # Tambahkan IP publik MikroTik tiap lokasi di blok allow di bawah.
    # Aplikasi juga memvalidasi API key via header X-Api-Key (double protection).
    server {
        listen      443 ssl;
        http2       on;
        server_name wifiapi.fadiljaya.com;

        ssl_certificate     /etc/letsencrypt/live/wifiapi.fadiljaya.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/wifiapi.fadiljaya.com/privkey.pem;

        # ── IP Whitelist ──────────────────────────────────────────────────────
        # Localhost dan jaringan Docker (Next.js cron calls sendiri)
        allow 127.0.0.1;
        allow ::1;
        allow 172.16.0.0/12;    # Docker internal network
        allow 10.0.0.0/8;       # Private LAN (jika MikroTik di jaringan lokal)

        # !! Tambahkan IP publik MikroTik tiap lokasi di sini:
        # allow X.X.X.X;        # Lokasi A — MikroTik
        # allow X.X.X.X;        # Lokasi B — MikroTik

        deny all;
        # ─────────────────────────────────────────────────────────────────────

        location / {
            proxy_pass         http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
