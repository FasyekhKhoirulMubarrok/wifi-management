# FadilJaya.NET — SQL queries untuk rlm_sql MySQL
# Kompatibel dengan schema di prisma/radius-tables.sql
######################################################################

# ──────────────────────────────────────────────────────────────────
# Authorization queries
# ──────────────────────────────────────────────────────────────────

authorize_check_query = "\
    SELECT id, username, attribute, value, op \
    FROM ${authcheck_table} \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY id"

authorize_reply_query = "\
    SELECT id, username, attribute, value, op \
    FROM ${authreply_table} \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY id"

authorize_group_check_query = "\
    SELECT ${groupcheck_table}.id, ${groupcheck_table}.groupname, \
           ${groupcheck_table}.attribute, ${groupcheck_table}.value, \
           ${groupcheck_table}.op \
    FROM ${groupcheck_table}, ${usergroup_table} \
    WHERE ${usergroup_table}.username = '%{SQL-User-Name}' \
    AND ${usergroup_table}.groupname = ${groupcheck_table}.groupname \
    ORDER BY ${usergroup_table}.priority, ${groupcheck_table}.id"

authorize_group_reply_query = "\
    SELECT ${groupreply_table}.id, ${groupreply_table}.groupname, \
           ${groupreply_table}.attribute, ${groupreply_table}.value, \
           ${groupreply_table}.op \
    FROM ${groupreply_table}, ${usergroup_table} \
    WHERE ${usergroup_table}.username = '%{SQL-User-Name}' \
    AND ${usergroup_table}.groupname = ${groupreply_table}.groupname \
    ORDER BY ${usergroup_table}.priority, ${groupreply_table}.id"

# ──────────────────────────────────────────────────────────────────
# Accounting queries
# ──────────────────────────────────────────────────────────────────

accounting_onoff_query = "\
    UPDATE ${acct_table1} \
    SET \
        acctstoptime    = FROM_UNIXTIME(%{integer:Event-Timestamp}), \
        acctsessiontime = UNIX_TIMESTAMP(FROM_UNIXTIME(%{integer:Event-Timestamp})) - \
                          UNIX_TIMESTAMP(acctstarttime), \
        acctterminatecause = '%{Acct-Terminate-Cause}' \
    WHERE acctstoptime IS NULL \
    AND nasipaddress   = '%{NAS-IP-Address}' \
    AND acctstarttime <= FROM_UNIXTIME(%{integer:Event-Timestamp})"

accounting_start_query = "\
    INSERT INTO ${acct_table1} \
        (acctsessionid, acctuniqueid, username, realm, nasipaddress, \
         nasportid, nasporttype, acctstarttime, acctupdatetime, \
         acctauthentic, connectinfo_start, acctinputoctets, \
         acctoutputoctets, calledstationid, callingstationid, \
         servicetype, framedprotocol, framedipaddress) \
    VALUES \
        ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', \
         '%{SQL-User-Name}', '%{Realm}', '%{NAS-IP-Address}', \
         '%{NAS-Port-Id}', '%{NAS-Port-Type}', \
         FROM_UNIXTIME(%{integer:Event-Timestamp}), \
         FROM_UNIXTIME(%{integer:Event-Timestamp}), \
         '%{Acct-Authentic}', '%{Connect-Info}', \
         '0', '0', \
         '%{Called-Station-Id}', '%{Calling-Station-Id}', \
         '%{Service-Type}', '%{Framed-Protocol}', \
         '%{Framed-IP-Address}')"

accounting_start_query_alt = "\
    UPDATE ${acct_table1} \
    SET \
        acctstarttime   = FROM_UNIXTIME(%{integer:Event-Timestamp}), \
        acctupdatetime  = FROM_UNIXTIME(%{integer:Event-Timestamp}), \
        connectinfo_start = '%{Connect-Info}' \
    WHERE acctuniqueid  = '%{Acct-Unique-Session-Id}'"

accounting_update_query = "\
    UPDATE ${acct_table1} \
    SET \
        acctupdatetime  = FROM_UNIXTIME(%{integer:Event-Timestamp}), \
        acctinterval    = %{Acct-Interval}, \
        framedipaddress = '%{Framed-IP-Address}', \
        acctsessiontime = %{Acct-Session-Time}, \
        acctinputoctets  = '%{Acct-Input-Gigawords}'  * CAST(4294967296 AS UNSIGNED) \
                         + '%{Acct-Input-Octets}', \
        acctoutputoctets = '%{Acct-Output-Gigawords}' * CAST(4294967296 AS UNSIGNED) \
                         + '%{Acct-Output-Octets}' \
    WHERE acctuniqueid  = '%{Acct-Unique-Session-Id}' \
    AND acctstoptime IS NULL"

accounting_stop_query = "\
    UPDATE ${acct_table2} \
    SET \
        acctstoptime    = FROM_UNIXTIME(%{integer:Event-Timestamp}), \
        acctupdatetime  = FROM_UNIXTIME(%{integer:Event-Timestamp}), \
        acctsessiontime = %{Acct-Session-Time}, \
        acctinputoctets  = '%{Acct-Input-Gigawords}'  * CAST(4294967296 AS UNSIGNED) \
                         + '%{Acct-Input-Octets}', \
        acctoutputoctets = '%{Acct-Output-Gigawords}' * CAST(4294967296 AS UNSIGNED) \
                         + '%{Acct-Output-Octets}', \
        acctterminatecause = '%{Acct-Terminate-Cause}', \
        connectinfo_stop   = '%{Connect-Info}' \
    WHERE acctuniqueid  = '%{Acct-Unique-Session-Id}' \
    AND acctstoptime IS NULL"

accounting_stop_query_alt = "\
    INSERT INTO ${acct_table2} \
        (acctsessionid, acctuniqueid, username, realm, nasipaddress, \
         nasportid, nasporttype, acctstarttime, acctupdatetime, acctstoptime, \
         acctauthentic, connectinfo_start, connectinfo_stop, \
         acctsessiontime, acctinputoctets, acctoutputoctets, \
         calledstationid, callingstationid, \
         acctterminatecause, servicetype, framedprotocol, framedipaddress) \
    VALUES \
        ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', \
         '%{SQL-User-Name}', '%{Realm}', '%{NAS-IP-Address}', \
         '%{NAS-Port-Id}', '%{NAS-Port-Type}', \
         FROM_UNIXTIME(%{integer:Event-Timestamp} - %{Acct-Session-Time}), \
         FROM_UNIXTIME(%{integer:Event-Timestamp}), \
         FROM_UNIXTIME(%{integer:Event-Timestamp}), \
         '%{Acct-Authentic}', '', '%{Connect-Info}', \
         '%{Acct-Session-Time}', \
         '%{Acct-Input-Gigawords}'  * CAST(4294967296 AS UNSIGNED) + '%{Acct-Input-Octets}', \
         '%{Acct-Output-Gigawords}' * CAST(4294967296 AS UNSIGNED) + '%{Acct-Output-Octets}', \
         '%{Called-Station-Id}', '%{Calling-Station-Id}', \
         '%{Acct-Terminate-Cause}', '%{Service-Type}', \
         '%{Framed-Protocol}', '%{Framed-IP-Address}')"

# ──────────────────────────────────────────────────────────────────
# Simultaneous-Use queries
# ──────────────────────────────────────────────────────────────────

simul_count_query = "\
    SELECT COUNT(*) \
    FROM ${acct_table1} \
    WHERE username = '%{SQL-User-Name}' \
    AND acctstoptime IS NULL"

simul_verify_query = "\
    SELECT radacctid, acctsessionid, username, nasipaddress, nasportid, \
           framedipaddress \
    FROM ${acct_table1} \
    WHERE username = '%{SQL-User-Name}' \
    AND acctstoptime IS NULL"

# ──────────────────────────────────────────────────────────────────
# Group membership query
# ──────────────────────────────────────────────────────────────────

group_membership_query = "\
    SELECT groupname \
    FROM ${usergroup_table} \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY priority"
